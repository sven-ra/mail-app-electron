<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Viewer</title>
</head>
<body>
  <h1>Email Viewer</h1>

  <div>
    <label>Host: <input type="text" id="host"></label><br>
    <label>Username: <input type="text" id="username"></label><br>
    <label>Password: <input type="password" id="password"></label><br>
    <button id="connectBtn">Save & Connect</button>
  </div>

  <div id="status"></div>

  <table width="100%">
    <tr valign="top">
      <td width="40%">
        <h2>Inbox</h2>
        <ul id="inboxList"></ul>
      </td>
      <td width="60%">
        <h2>Content</h2>
        <div id="emailContent"></div>
      </td>
    </tr>
  </table>

  <script src="renderer.js"></script>
</body>
</html>
